<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple - Bet365</title>
    <style>
        :root { --bg-page: #121212; --bg-card: #282828; --btn-grey: #333333; --bet-green: #00A67A; --text-white: #ffffff; --text-grey: #999999; --border: #383838; }
        body { background-color: var(--bg-page); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .bet-container { background-color: var(--bg-card); width: 360px; color: var(--text-white); border-radius: 2px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); overflow: hidden; }
        .header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .header-amount { color: var(--bet-green); font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .header-amount .type { font-size: 17px; font-weight: 600; }
        .top-actions { display: flex; padding: 12px 16px; gap: 10px; }
        .action-btn { background-color: var(--btn-grey); border: none; color: #eeeeee; padding: 8px; border-radius: 3px; font-size: 13px; font-weight: 600; flex: 1; text-align: center; }
        .pick-info { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .selection-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .dot-icon { width: 8px; height: 8px; border: 1.5px solid #777; border-radius: 50%; }
        .selection-name { font-size: 15px; font-weight: 700; }
        .selection-odds { font-size: 15px; font-weight: 700; }
        .market-name { color: var(--text-grey); font-size: 12px; padding-left: 20px; margin-bottom: 6px; }
        .match-card { margin-left: 20px; padding-left: 10px; border-left: 1.5px solid #444; display: flex; justify-content: space-between; }
        .team-names { font-size: 13px; line-height: 1.4; color: #fff; }
        .time-box { text-align: right; color: var(--text-grey); font-size: 11px; }
        .stats-footer { display: flex; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); }
        .stat-label { color: var(--text-grey); font-size: 12px; }
        .stat-value { font-size: 16px; font-weight: 700; }
        .cashout-wrapper { padding: 0 16px 12px 16px; }
        .cashout-button { background-color: var(--bet-green); color: #002b20; text-align: center; padding: 10px; border-radius: 4px; font-weight: 800; font-size: 14px; }
        [contenteditable="true"] { outline: none; }
    </style>
</head>
<body>
    <div class="bet-container">
        <div class="header"><div class="header-amount"><span contenteditable="true">500,00€</span> <span class="type">Triples</span></div></div>
        <div class="top-actions">
            <div class="action-btn" contenteditable="true">Reutilizar selecciones</div>
            <div class="action-btn" contenteditable="true">Compartir</div>
        </div>
        <div class="pick-info">
            <div class="selection-row"><div class="dot-icon"></div><div class="selection-name" contenteditable="true">Liverpool</div><div class="selection-odds" contenteditable="true">1.40</div></div>
            <div class="market-name" contenteditable="true">Resultado final</div>
            <div class="match-card"><div class="team-names"><div contenteditable="true">Liverpool</div><div contenteditable="true">Everton</div></div><div class="time-box"><div contenteditable="true">Hoy</div><div contenteditable="true">18:30</div></div></div>
        </div>
        <div class="pick-info">
            <div class="selection-row"><div class="dot-icon"></div><div class="selection-name" contenteditable="true">Sí</div><div class="selection-odds" contenteditable="true">1.90</div></div>
            <div class="market-name" contenteditable="true">Ambos equipos marcan</div>
            <div class="match-card"><div class="team-names"><div contenteditable="true">Valencia</div><div contenteditable="true">Sevilla</div></div><div class="time-box"><div contenteditable="true">Hoy</div><div contenteditable="true">21:00</div></div></div>
        </div>
        <div class="pick-info" style="border-bottom: none;">
            <div class="selection-row"><div class="dot-icon"></div><div class="selection-name" contenteditable="true">Bayern de Múnich</div><div class="selection-odds" contenteditable="true">1.30</div></div>
            <div class="market-name" contenteditable="true">Resultado final</div>
            <div class="match-card"><div class="team-names"><div contenteditable="true">Bayern de Múnich</div><div contenteditable="true">Hamburgo</div></div><div class="time-box"><div contenteditable="true">Mañana</div><div contenteditable="true">15:30</div></div></div>
        </div>
        <div class="stats-footer">
            <div class="stat-group"><div class="stat-label">Imp:</div><div class="stat-value" contenteditable="true">500,00€</div></div>
            <div class="stat-group" style="text-align: right;"><div class="stat-label">Ganancias</div><div class="stat-value" contenteditable="true">1.729,00€</div></div>
        </div>
        <div class="cashout-wrapper"><div class="cashout-button">Cerrar apuesta <span contenteditable="true">500,00€</span></div></div>
    </div>
</body>
</html>
