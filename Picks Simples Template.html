<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla Pick Bet365 Profesional</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-card: #282828;
            --btn-grey: #333333;
            --bet-green: #00A67A;
            --text-white: #ffffff;
            --text-grey: #999999;
            --border: #383838;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .bet-container {
            background-color: var(--bg-card);
            width: 360px;
            color: var(--text-white);
            border-radius: 2px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Cabecera Principal */
        .header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-amount {
            color: var(--bet-green);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-amount .type {
            font-size: 17px;
            font-weight: 600;
        }

        /* Botones superiores sin logos */
        .top-actions {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
        }

        .action-btn {
            background-color: var(--btn-grey);
            border: none;
            color: #eeeeee;
            padding: 8px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            cursor: pointer;
        }

        /* Detalles del pick */
        .pick-info {
            padding: 12px 16px 20px 16px;
        }

        .selection-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .dot-icon {
            width: 8px;
            height: 8px;
            border: 1.5px solid #777;
            border-radius: 50%;
        }

        .selection-name {
            font-size: 17px;
            font-weight: 700;
        }

        .selection-odds {
            font-size: 17px;
            font-weight: 700;
            margin-left: 2px;
        }

        .market-name {
            color: var(--text-grey);
            font-size: 14px;
            padding-left: 22px;
            margin-bottom: 12px;
        }

        .match-card {
            margin-left: 22px;
            padding-left: 12px;
            border-left: 2px solid #444;
            display: flex;
            justify-content: space-between;
        }

        .team-names {
            font-size: 15px;
            line-height: 1.5;
            color: #fff;
        }

        .time-box {
            text-align: right;
            color: var(--text-grey);
            font-size: 12px;
        }

        /* Footer de montos */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }

        .stat-label {
            color: var(--text-grey);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        /* Botón inferior verde */
        .cashout-wrapper {
            padding: 0 16px 16px 16px;
        }

        .cashout-button {
            background-color: var(--bet-green);
            color: #002b20;
            text-align: center;
            padding: 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 15px;
            text-transform: none;
        }

        /* Estilo para edición en vivo */
        [contenteditable="true"] {
            outline: none;
        }
        [contenteditable="true"]:focus {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="bet-container">
        <div class="header">
            <div class="header-amount">
                <span contenteditable="true">2.000,00€</span>
                <span class="type" contenteditable="true">Sencillas</span>
            </div>
        </div>

        <div class="top-actions">
            <div class="action-btn" contenteditable="true">Reutilizar selecciones</div>
            <div class="action-btn" contenteditable="true">Compartir</div>
        </div>

        <div class="pick-info">
            <div class="selection-row">
                <div class="dot-icon"></div>
                <div class="selection-name" contenteditable="true">Sí</div>
                <div class="selection-odds" contenteditable="true">1.77</div>
            </div>
            
            <div class="market-name" contenteditable="true">Ambos equipos marcan</div>

            <div class="match-card">
                <div class="team-names">
                    <div contenteditable="true">Alavés</div>
                    <div contenteditable="true">Villarreal</div>
                </div>
                <div class="time-box">
                    <div contenteditable="true">Hoy</div>
                    <div contenteditable="true">21:00</div>
                </div>
            </div>
        </div>

        <div class="stats-footer">
            <div class="stat-group">
                <div class="stat-label">Imp:</div>
                <div class="stat-value" contenteditable="true">2.000,00€</div>
            </div>
            <div class="stat-group" style="text-align: right;">
                <div class="stat-label">Ganancias</div>
                <div class="stat-value" contenteditable="true">3.540,00€</div>
            </div>
        </div>

        <div class="cashout-wrapper">
            <div class="cashout-button">
                Cerrar apuesta <span contenteditable="true">2.000,00€</span>
            </div>
        </div>
    </div>

</body>
</html>
